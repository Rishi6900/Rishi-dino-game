<!DOCTYPE html>
<html>
<head>
    <title>Rishi's Multiverse Dino Game</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
            transition: background 0.8s;
        }
        h1 { color: #00ff7f; margin-bottom: 5px; text-shadow: 0 0 10px #00ff7f; }
        #modeText { font-size: 20px; color: #ffeb3b; font-weight: bold; }
        
        /* Game Screen Box */
        #gameArea {
            width: 800px;
            height: 400px;
            border-bottom: 4px solid #fff;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            background-color: #222;
            border-radius: 8px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.1);
            transition: all 0.8s ease; 
        }

        /* Hamara Dinosaur */
        #hero {
            width: 40px;
            height: 40px;
            font-size: 35px; 
            position: absolute;
            bottom: 0;
            left: 50px;
            line-height: 40px;
            transition: transform 0.2s; 
            transform-origin: bottom center;
            z-index: 5;
        }

        /* Dushman Box */
        #obstacle {
            width: 40px;
            height: 40px;
            font-size: 35px; 
            position: absolute;
            bottom: 0;
            right: -50px;
            line-height: 40px;
        }

        /* Jump Animation */
        .jump-animation {
            animation: jump 0.42s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 150px; } 
            100% { bottom: 0; }
        }

        /* Dushman Animation */
        .block-animation {
            animation: blockMove 1.4s infinite linear;
        }
        @keyframes blockMove {
            0% { right: -50px; }
            100% { right: 850px; } 
        }

        /* Dino takraate hi tilt ho kar gir jayega */
        .dead-animation {
            transform: rotate(90deg) translateY(10px) !important;
        }

        /* Custom Cool Pop-up */
        #customPopup {
            display: none; 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(20, 20, 20, 0.98);
            border: 3px solid #ff4757;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 30px #ff4757;
            z-index: 10;
            width: 350px;
        }
        #popupTitle { color: #ff4757; font-size: 28px; margin: 0; }
        #popupInsult { font-size: 18px; margin: 15px 0; color: #ffcccc; }
        #popupScore { font-size: 22px; color: #00ffff; }
        
        #restartBtn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        #restartBtn:hover { background-color: #ff6b81; }
    </style>
</head>
<body>

    <h1>🦖 Rishi's Multiverse Game 🌌</h1>
    <div id="modeText">🌍 KAAL (Era 1): Puraani Duniya</div>
    <p>"Spacebar" ya Screen par click karke Jump karo!</p>
    <h2 id="scoreText">Score: 0</h2>

    <div id="gameArea" onclick="jump()">
        <div id="hero">🦖</div>
        <div id="obstacle" class="block-animation">🌵</div>
    </div>

    <div id="customPopup">
        <h2 id="popupTitle">💥 GAME OVER 💥</h2>
        <p id="popupInsult">Beizzati message yahan aayega</p>
        <div id="popupScore">Score: 0</div>
        <button id="restartBtn" onclick="restartGame()">GHAR JAA BHAI TU!! 😂</button>
    </div>

    <script>
        const hero = document.getElementById("hero");
        const obstacle = document.getElementById("obstacle");
        const scoreText = document.getElementById("scoreText");
        const gameArea = document.getElementById("gameArea");
        const modeText = document.getElementById("modeText");
        
        const customPopup = document.getElementById("customPopup");
        const popupInsult = document.getElementById("popupInsult");
        const popupScore = document.getElementById("popupScore");

        let score = 0;
        let isAlive = true;
        let currentLevel = 1;

        const insults = [
            "Kya gunda banega re tu! 😭",
            "Bhai! phone switch off karke soo ja! 💀",
            "Mere dada ji tumse tez jump karte hain! 👵",
            "Nubda player spotted! horlics peke aa! 🤣",
            "Lagta hai ungliyon me jaan nahi hai tere! 🤫"
        ];

        function jump() {
            if (hero.classList != "jump-animation" && isAlive) {
                hero.classList.add("jump-animation");
                setTimeout(function () {
                    hero.classList.remove("jump-animation");
                }, 420);
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                jump();
            }
        });

        // Takkar check loop
        let checkDead = setInterval(function () {
            let heroRect = hero.getBoundingClientRect();
            let obstacleRect = obstacle.getBoundingClientRect();

            if (
                heroRect.right > obstacleRect.left &&
                heroRect.left < obstacleRect.right &&
                heroRect.bottom > obstacleRect.top
            ) {
                if (isAlive) { gameOver(); }
            }
        }, 10);

        // Score Counter aur Background Changing Twist
        setInterval(function() {
            if (isAlive) {
                score++;
                scoreText.innerText = "Score: " + score;

                // 🌟 TWIST LEVEL 2: Cyberpunk Alien Mode (Score 40 par)
                if (score >= 40 && score < 90 && currentLevel === 1) {
                    currentLevel = 2;
                    modeText.innerText = "👽 KAAL (Era 2): Alien Hamla!!";
                    modeText.style.color = "#00ffff";
                    gameArea.style.backgroundColor = "#2c003e"; // Purple Neon style
                    gameArea.style.borderBottomColor = "#00ffff";
                    obstacle.innerText = "🛸"; // Cactus ban gaya UFO!
                    obstacle.style.animationDuration = "1.1s"; // Speed tez!
                } 
                // 🌟 TWIST LEVEL 3: Hell/Danger Mode (Score 90 par)
                else if (score >= 90 && currentLevel === 2) {
                    currentLevel = 3;
                    modeText.innerText = "🔥 KAAL (Era 3): NARAK MODE!!";
                    modeText.style.color = "#ff4757";
                    gameArea.style.backgroundColor = "#4a0000"; // Blood Red
                    gameArea.style.borderBottomColor = "#ff4757";
                    obstacle.innerText = "👻"; // UFO ban gaya Bhoot!
                    obstacle.style.animationDuration = "0.8s"; // Bahut fast!
                }
            }
        }, 100);

        function gameOver() {
            isAlive = false;
            let currentLeft = window.getComputedStyle(obstacle).getPropertyValue("left");
            obstacle.classList.remove("block-animation");
            obstacle.style.left = currentLeft;
            
            hero.classList.add("dead-animation");
            
            let randomInsult = insults[Math.floor(Math.random() * insults.length)];
            popupInsult.innerText = randomInsult;
            popupScore.innerText = "Final Score: " + score;
            customPopup.style.display = "block";
        }

        function restartGame() {
            score = 0;
            isAlive = true;
            currentLevel = 1;
            scoreText.innerText = "Score: 0";
            scoreText.style.color = "white";
            modeText.innerText = "🌍 KAAL (Era 1): Puraani Duniya";
            modeText.style.color = "#ffeb3b";
            
            gameArea.style.backgroundColor = "#222"; 
            gameArea.style.borderBottomColor = "#fff";
            
            hero.classList.remove("dead-animation");
            obstacle.innerText = "🌵"; // Wapas cactus
            obstacle.style.animationDuration = "1.4s"; // normal speed
            
            obstacle.style.left = ""; 
            obstacle.style.right = "-50px";
            obstacle.classList.add("block-animation");
            customPopup.style.display = "none"; 
        }
    </script>
</body>
</html>
